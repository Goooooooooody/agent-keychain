name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: akc-aarch64-apple-darwin.tar.gz
            binary: akc
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: akc-x86_64-pc-windows-msvc.zip
            binary: akc.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --locked --release --target ${{ matrix.target }}
      - name: Package Unix
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/${{ matrix.binary }}
          tar -C dist -czf ${{ matrix.archive }} ${{ matrix.binary }}
      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/${{ matrix.target }}/release/${{ matrix.binary }} dist/${{ matrix.binary }}
          Compress-Archive -Path dist/${{ matrix.binary }} -DestinationPath ${{ matrix.archive }}
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive }}
