name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: aarch64-apple-darwin
            archive: akc-aarch64-apple-darwin.tar.gz
            binary: akc
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive: akc-x86_64-apple-darwin.tar.gz
            binary: akc
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive: akc-x86_64-unknown-linux-gnu.tar.gz
            binary: akc
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: akc-aarch64-unknown-linux-gnu.tar.gz
            binary: akc
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            archive: akc-x86_64-pc-windows-msvc.zip
            binary: akc.exe
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable (2026-06-30)
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --locked --release --target ${{ matrix.target }}
      - name: Package and checksum (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist smoke
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.binary }}"
          tar -C dist -czf "${{ matrix.archive }}" "${{ matrix.binary }}"
          shasum -a 256 "${{ matrix.archive }}" > "${{ matrix.archive }}.sha256"
          tar -C smoke -xzf "${{ matrix.archive }}"
          "smoke/${{ matrix.binary }}" --version
      - name: Package and checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force dist, smoke | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.binary }}"
          Compress-Archive -Path "dist/${{ matrix.binary }}" -DestinationPath "${{ matrix.archive }}"
          $hash = (Get-FileHash -Algorithm SHA256 "${{ matrix.archive }}").Hash.ToLowerInvariant()
          "$hash  ${{ matrix.archive }}" | Set-Content -Encoding ascii "${{ matrix.archive }}.sha256"
          Expand-Archive -Path "${{ matrix.archive }}" -DestinationPath smoke
          & "smoke/${{ matrix.binary }}" --version
      - name: Attest release archive
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256
      - name: Stage release assets
        shell: bash
        run: |
          mkdir -p release-assets
          mv "${{ matrix.archive }}" "${{ matrix.archive }}.sha256" release-assets/
      - name: Upload release assets
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-${{ matrix.target }}
          path: release-assets/
          if-no-files-found: error

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable (2026-06-30)
      - name: Install pinned CycloneDX generator
        run: cargo install cargo-cyclonedx --version 0.5.9 --locked
      - name: Generate CycloneDX SBOM
        shell: bash
        run: |
          set -euo pipefail
          cargo cyclonedx --format json
          test -f agent-keychain.cdx.json
          mkdir -p release-assets
          mv agent-keychain.cdx.json "release-assets/agent-keychain-${GITHUB_REF_NAME}.cdx.json"
          cd release-assets
          sha256sum "agent-keychain-${GITHUB_REF_NAME}.cdx.json" \
            > "agent-keychain-${GITHUB_REF_NAME}.cdx.json.sha256"
      - name: Attest SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: release-assets/*
      - name: Upload SBOM assets
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-sbom
          path: release-assets/
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: [build, sbom]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Download attested assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true
      - name: Verify asset checksums
        working-directory: release-assets
        run: sha256sum --check *.sha256
      - name: Attest release SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: |
            release-assets/*.tar.gz
            release-assets/*.zip
          sbom-path: release-assets/*.cdx.json
      - name: Publish release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: release-assets/*
